name: Publish to npm

# Triggers when you publish a GitHub Release.
# Workflow:
#   1. npm version patch|minor|major  (bumps version, commits, creates tag)
#   2. git push origin main --tags
#   3. gh release create v<version> --generate-notes   (or GitHub UI)
#   4. This action runs automatically and publishes to npm.

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # required for npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
